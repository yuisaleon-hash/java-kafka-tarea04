services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - kafka-network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - kafka-network

  kafka-setup:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka-setup
    depends_on:
      - kafka
    networks:
      - kafka-network
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "
      echo 'Esperando a Kafka...' &&
      sleep 15 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic TOPICO_ALUMNOS    --partitions 1 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic TOPICO_PROFESORES --partitions 1 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic TOPICO_DIRECTORES --partitions 1 --replication-factor 1 &&
      echo '✅ Tópicos creados!'
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - kafka-network

  producer:
    build: .
    container_name: kafka-producer
    depends_on:
      - kafka-setup
    stdin_open: true
    tty: true
    command: [ "/app/producer.jar" ]
    ports:                 # <- AGREGAR
      - "8082:8082"        # <- AGREGAR
    networks:
      - kafka-network

  consumer:
    build: .
    container_name: kafka-consumer
    depends_on:
      - kafka-setup
    command: [ "/app/consumer.jar" ]
    ports:                 # <- AGREGAR
      - "8081:8081"        # <- AGREGAR
    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge